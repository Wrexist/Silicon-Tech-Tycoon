name: CI

# Typecheck + unit tests + build on every PR and on pushes to main. The engine is pure,
# fully unit-tested TypeScript (the simulation's source of truth), so this keeps "tsc clean +
# tests green + build OK" verifiable on GitHub, not just on the author's machine.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Separate steps so a failure points straight at the culprit (types vs tests vs bundler).
      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
