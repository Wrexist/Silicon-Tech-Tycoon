name: iOS Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Show Xcode Version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Archive App
        run: |
          mkdir -p build

          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            -allowProvisioningUpdates

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: silicon-tech-tycoon-xcarchive
          path: build/App.xcarchive
