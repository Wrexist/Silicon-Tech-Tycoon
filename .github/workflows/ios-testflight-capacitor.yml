name: iOS Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Show Xcode Version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Set Apple Team ID
        run: |
          if ! grep -q "DEVELOPMENT_TEAM" ios/App/App.xcodeproj/project.pbxproj; then
            /usr/bin/sed -i '' '/PRODUCT_BUNDLE_IDENTIFIER = com.wrexist.silicon;/a\
            DEVELOPMENT_TEAM = S3U8B8HH96;
            ' ios/App/App.xcodeproj/project.pbxproj
          fi

          grep DEVELOPMENT_TEAM ios/App/App.xcodeproj/project.pbxproj
          
      - name: Debug signing settings
        run: |
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" ios/App/App.xcodeproj/project.pbxproj || true
          grep -n "DEVELOPMENT_TEAM" ios/App/App.xcodeproj/project.pbxproj || true

      - name: Archive App
        run: |
          mkdir -p build

          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            -allowProvisioningUpdates

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: silicon-tech-tycoon-xcarchive
          path: build/App.xcarchive
