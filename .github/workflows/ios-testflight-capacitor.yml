name: iOS TestFlight

# Build the web app, wrap it with Capacitor, archive a signed iOS build using
# App Store Connect API-key (cloud) signing, export an App Store IPA, and upload
# it to TestFlight.
#
# Required repository secrets  (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_KEY_ID          App Store Connect API key ID         (e.g. ABC123XYZ9)
#                                     The key MUST have the *Admin* role — only Admin keys can do the
#                                     cloud-managed distribution signing the export step needs. A
#                                     Developer/App-Manager key archives fine but fails -exportArchive
#                                     with "Cloud signing permission error", and there is no web toggle
#                                     to grant a key that access after the fact (recreate it as Admin).
#   APP_STORE_CONNECT_ISSUER_ID       API key issuer ID                    (a UUID)
#   APP_STORE_CONNECT_API_KEY_BASE64  base64 of the .p8 key file. Any of:
#                                       macOS/Linux:  base64 -i AuthKey_XXXX.p8 | pbcopy
#                                       Windows PS:   [Convert]::ToBase64String([IO.File]::ReadAllBytes('AuthKey_XXXX.p8')) | Set-Clipboard
#                                     (The install step also accepts the raw .p8 text pasted directly.)
# The Apple Developer Team ID is public (it's in project.pbxproj) and set as TEAM_ID below.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

env:
  TEAM_ID: S3U8B8HH96

jobs:
  testflight:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          missing=()
          [ -n "$KEY_ID" ]     || missing+=("APP_STORE_CONNECT_KEY_ID")
          [ -n "$ISSUER_ID" ]  || missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -n "$API_KEY_B64" ] || missing+=("APP_STORE_CONNECT_API_KEY_BASE64")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}. Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required App Store Connect secrets are present."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor (iOS)
        # Regenerates Package.swift, copies dist/ → ios/App/App/public, writes the
        # capacitor.config.json / config.xml the Xcode target expects.
        run: npx cap sync ios

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install App Store Connect API key
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${KEY_ID}.p8"

          # The secret can arrive in any of the common shapes people produce on
          # different OSes, so normalise rather than assume one clean encoding:
          #   1. the raw .p8 PEM text pasted directly (no base64 at all);
          #   2. base64 from a Windows encoder (certutil) — wrapped at 64 cols with CRLF;
          #   3. clean single-line base64 (pbcopy / PowerShell ToBase64String).
          if printf '%s' "$API_KEY_B64" | grep -q 'BEGIN PRIVATE KEY'; then
            # Case 1: raw PEM was pasted — just strip any CR and use it verbatim.
            printf '%s' "$API_KEY_B64" | tr -d '\r' > "$KEY_PATH"
          else
            # Cases 2/3: strip all whitespace/newlines/CR, then decode.
            printf '%s' "$API_KEY_B64" | tr -d '[:space:]' | openssl base64 -d -A > "$KEY_PATH"
          fi
          chmod 600 "$KEY_PATH"

          # Fail fast with an actionable message if the result isn't a usable key,
          # instead of letting xcodebuild emit a cryptic CryptoKit PEM error.
          if ! grep -q 'BEGIN PRIVATE KEY' "$KEY_PATH"; then
            echo "::error::APP_STORE_CONNECT_API_KEY_BASE64 did not decode to a valid .p8 private key."
            echo "::error::Set it to the base64 of your AuthKey_*.p8 file. Windows PowerShell:"
            echo "::error::  [Convert]::ToBase64String([IO.File]::ReadAllBytes('AuthKey_XXXX.p8')) | Set-Clipboard"
            echo "::error::Or paste the .p8 file's full text (the -----BEGIN PRIVATE KEY----- block) directly."
            exit 1
          fi
          echo "Decoded a valid App Store Connect API key."
          echo "API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Archive
        # Automatic signing archives with a DEVELOPMENT identity here; the App Store
        # (distribution) re-sign happens in "Export IPA" via ExportOptions.plist
        # (method: app-store-connect). Do NOT pin CODE_SIGN_IDENTITY=Apple Distribution
        # on this command — forcing a distribution identity onto automatic development
        # signing fails the archive with "conflicting provisioning settings".
        #
        # If the archive instead fails with "choose a certificate to revoke" / "no iOS
        # App Development provisioning profiles", that's the Apple account at its cert
        # cap, not a workflow bug: CI automatic signing mints a fresh dev cert per
        # ephemeral runner and they pile up. Clear the stale ones and re-run — either in
        # the developer portal, or in one command with the App Store Connect API key:
        #   npm run certs:clean            # dry run: lists the stale DEVELOPMENT certs
        #   npm run certs:clean -- --yes   # revoke them (keeps the newest; never Distribution)
        # (see scripts/asc-revoke-dev-certs.mjs). The durable fix is manual signing with a
        # single imported identity, not changing this identity.
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            archive

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA="$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)"
          if [ -z "$IPA" ]; then echo "::error::No .ipa produced by export."; exit 1; fi
          echo "Uploading $IPA to TestFlight…"
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: silicon-ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn

      - name: Clean up API key
        if: always()
        run: rm -f "$HOME"/.appstoreconnect/private_keys/AuthKey_*.p8
