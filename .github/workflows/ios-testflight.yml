name: EAS Build iOS (local · no cloud credits)

# Builds the iOS app with `eas build --local` on a GitHub macOS runner and
# (optionally) submits to TestFlight. Unlike .github/workflows/eas-build.yml
# (which uses Expo's cloud build queue), this consumes ZERO EAS Build credits —
# use it when the monthly cloud quota is exhausted.
#
# Cost note: macOS runner minutes bill ~10x. Cheap gates run on ubuntu first;
# the expensive build/submit only runs on macos after they pass.

on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Submit the build to TestFlight after building'
        type: boolean
        # Safe by default: TestFlight submission is outward-facing and hard to
        # reverse, so it is opt-in — tick this when you actually want to submit.
        default: false

concurrency:
  group: ios-local-release
  cancel-in-progress: false

# Least privilege: these jobs only read code, run EAS, and upload artifacts.
permissions:
  contents: read
  actions: read

jobs:
  # ---- Cheap gates on ubuntu (mirrors eas-build.yml) -----------------------
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Fail fast on Ubuntu if the EAS auth token is missing, before the
      # build job spends (10x-billed) macOS minutes.
      - name: Require EXPO_TOKEN
        run: test -n "$EXPO_TOKEN" || { echo "::error::EXPO_TOKEN repo secret is not set — add it under Settings ▸ Secrets ▸ Actions"; exit 1; }
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Route conflict check
        run: npm run check:routes

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci

      # Hard gate (CLAUDE.md rule #6): enforce revenue-critical + save-signing
      # production config before spending macOS minutes. All five required
      # secrets must be configured as GitHub Actions repo secrets, or this
      # fails — by design. Unlike eas-build.yml this is NOT continue-on-error
      # and DOES include EXPO_PUBLIC_SAVE_HMAC_KEY (check 8).

  # ---- Expensive build + submit on macOS -----------------------------------
  build-ios:
    needs: verify
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Authenticates eas-cli non-interactively via EXPO_TOKEN. `eas build
      # --local` still resolves EAS project secrets + remote build number
      # (appVersionSource: remote in eas.json) while logged in.
      - name: Expo/EAS login
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # --local compiles on this runner (no cloud credits). --output pins the
      # artifact path so submit/upload are deterministic. EXPO_PUBLIC_* are
      # passed explicitly so Metro embeds them at bundle time even if a project
      # secret is missing.
      - name: Show Xcode Version
        run: |
          xcodebuild -version
          xcode-select -p
          ls /Applications | grep Xcode
      - name: EAS Build iOS (local)
        run: |
          mkdir -p build
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/build/silicon-tech-tycoon.ipa"
        env:
          # Same fingerprint crash as eas-build.yml — see comment there.
          EAS_SKIP_AUTO_FINGERPRINT: '1'
          EXPO_PUBLIC_ENABLE_ADMOB: 'true'
          EXPO_PUBLIC_ENABLE_IAP: 'true'
          EXPO_PUBLIC_ENABLE_ATT: 'true'
          EXPO_PUBLIC_SAVE_HMAC_KEY: ${{ secrets.EXPO_PUBLIC_SAVE_HMAC_KEY }}
          EXPO_PUBLIC_IAP_VERIFY_URL: ${{ secrets.EXPO_PUBLIC_IAP_VERIFY_URL }}
          EXPO_PUBLIC_IAP_VERIFY_TOKEN: ${{ secrets.EXPO_PUBLIC_IAP_VERIFY_TOKEN }}
          EXPO_PUBLIC_ADMOB_IOS_APP_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_IOS_APP_ID }}
          EXPO_PUBLIC_ADMOB_BANNER_IOS: ${{ secrets.EXPO_PUBLIC_ADMOB_BANNER_IOS }}
          EXPO_PUBLIC_ADMOB_INTERSTITIAL_IOS: ${{ secrets.EXPO_PUBLIC_ADMOB_INTERSTITIAL_IOS }}
          EXPO_PUBLIC_ADMOB_REWARDED_IOS: ${{ secrets.EXPO_PUBLIC_ADMOB_REWARDED_IOS }}

      # Always keep the .ipa, even if submit is skipped/fails — lets you upload
      # manually via Transporter as a fallback.
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: silicon-tech-tycoon-ios-ipa
          path: build/silicon-tech-tycoon.ipa
          if-no-files-found: error
          retention-days: 14

      # Submit does NOT consume build credits. Uses submit.production.ios from
      # eas.json (ascAppId + appleTeamId). Requires an App Store Connect API key
      # stored as EAS credentials (set once: `eas credentials` or
      # `eas submit` interactively), so --non-interactive can reuse it.
      - name: Submit to TestFlight
        if: ${{ inputs.submit }}
        run: |
          eas submit \
            --platform ios \
            --profile production \
            --path "$GITHUB_WORKSPACE/build/deeplife.ipa" \
            --non-interactive
