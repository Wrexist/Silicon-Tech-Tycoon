name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: 'Marketing version e.g. 1.0.2. Leave blank to use the version in package.json.'
        required: false
        type: string
        default: ''

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # SSH key for Fastlane Match to pull certs from ios-certificates repo
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Trust GitHub SSH host key
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Override marketing version (only when input is set)
        if: github.event.inputs.marketing_version != ''
        run: npm version ${{ github.event.inputs.marketing_version }} --no-git-tag-version --allow-same-version

      - run: npm ci

      - name: Echo resolved version and build number
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "::notice::Shipping marketing_version=${PKG_VERSION} build=${{ github.run_number }}"
          echo "Marketing version: ${PKG_VERSION}"
          echo "Build number:      ${{ github.run_number }}"

      - name: Build web bundle
        run: npm run build

      # Generate ios/ if it doesn't exist yet (first run before the directory is committed)
      - name: Add Capacitor iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor (copies dist/ + native plugins into ios/)
        run: npx cap sync ios

      - name: Sync marketing version from package.json into iOS project
        run: npm run version:sync

      # Stamp build number directly in the Xcode project (same sed approach as dynasty-manager)
      - name: Stamp build number from run number
        run: |
          FILE=ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = ${{ github.run_number }};/g" "$FILE"

      # App Store requires fully opaque PNG — strip alpha channel if present
      - name: Strip alpha channel from App Store icon
        run: |
          ICON=ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
          if [ -f "$ICON" ]; then
            sips -s format jpeg -s formatOptions 100 "$ICON" --out "$ICON.jpg"
            sips -s format png "$ICON.jpg" --out "$ICON"
            rm -f "$ICON.jpg"
          fi

      - name: Deploy to TestFlight
        env:
          ASC_KEY_ID:     ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:  ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8:     ${{ secrets.ASC_KEY_P8 }}
          MATCH_GIT_URL:  ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane ios beta
