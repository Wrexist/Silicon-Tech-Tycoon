<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Silicon — video animation stage</title>
<style>
/* Deterministic 1080×1920 animation stage for the marketing B-roll clips.
   The node driver (scripts/render-video.mjs) sets a scenario, then calls renderFrame(t) for each
   frame and screenshots #stage as JPEG → piped to ffmpeg (VP8/webm). Everything is a pure function
   of t so the output is smooth and reproducible. Clean by design: minimal text, so you can talk
   over it. Hero images are the real device crops in ../assets/_device/. */
:root{ --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif; }
*{margin:0;box-sizing:border-box}
html,body{background:#04060a}
#stage{position:relative;width:1080px;height:1920px;overflow:hidden;background:#04060a;font-family:var(--font)}
.layer{position:absolute;inset:0;will-change:transform,opacity}
.layer img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;will-change:transform}
/* cinematic grade: subtle vignette + top/bottom safe-zone falloff */
#vignette{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 42%, transparent 55%, rgba(2,4,8,.55) 100%)}
#tint{position:absolute;inset:0;pointer-events:none;mix-blend-mode:soft-light;opacity:.5}
/* accent glow that breathes */
#glow{position:absolute;left:50%;bottom:-6%;width:80%;height:60%;transform:translateX(-50%);
  border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.28}
/* small brand bug, bottom-left, always subtle */
#bug{position:absolute;left:46px;bottom:60px;display:flex;align-items:center;gap:14px;opacity:0}
#bug .lw b{color:#fff;font-weight:800;letter-spacing:.14em;font-size:30px}
#bug .lw i{display:block;color:#9aa4b4;font-weight:600;letter-spacing:.26em;font-size:13px;font-style:normal;margin-top:3px}
/* end card */
#end{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:34px;background:radial-gradient(70% 50% at 50% 45%, rgba(10,14,25,.5), #05070c 78%);opacity:0}
#end .mark{filter:drop-shadow(0 20px 50px rgba(0,0,0,.6))}
#end .wm b{display:block;text-align:center;color:#fff;font-weight:800;letter-spacing:.16em;font-size:64px}
#end .wm i{display:block;text-align:center;color:#9aa4b4;font-weight:600;letter-spacing:.34em;font-size:26px;font-style:normal;margin-top:10px}
#end .badge{margin-top:6px}
</style>
</head>
<body>
<div id="stage">
  <div id="glow"></div>
  <div class="layer" id="L0"><img id="I0" alt=""></div>
  <div class="layer" id="L1"><img id="I1" alt=""></div>
  <div id="tint"></div>
  <div id="vignette"></div>
  <div id="bug">
    <svg class="mark" width="52" height="52" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#0f1115"/><g fill="#3b82f6"><rect x="196" y="120" width="18" height="42" rx="6"/><rect x="247" y="120" width="18" height="42" rx="6"/><rect x="298" y="120" width="18" height="42" rx="6"/><rect x="196" y="350" width="18" height="42" rx="6"/><rect x="247" y="350" width="18" height="42" rx="6"/><rect x="298" y="350" width="18" height="42" rx="6"/><rect x="120" y="196" width="42" height="18" rx="6"/><rect x="120" y="247" width="42" height="18" rx="6"/><rect x="120" y="298" width="42" height="18" rx="6"/><rect x="350" y="196" width="42" height="18" rx="6"/><rect x="350" y="247" width="42" height="18" rx="6"/><rect x="350" y="298" width="42" height="18" rx="6"/></g><rect x="156" y="156" width="200" height="200" rx="40" fill="#3b82f6"/><path d="M256 192 L320 256 L256 320 L192 256 Z" fill="none" stroke="#fff" stroke-width="16" stroke-linejoin="round"/><circle cx="256" cy="256" r="22" fill="#fff"/></svg>
    <div class="lw"><b>SILICON</b><i>TECH TYCOON</i></div>
  </div>
  <div id="end">
    <svg class="mark" width="150" height="150" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#0f1115"/><g fill="#3b82f6"><rect x="196" y="120" width="18" height="42" rx="6"/><rect x="247" y="120" width="18" height="42" rx="6"/><rect x="298" y="120" width="18" height="42" rx="6"/><rect x="196" y="350" width="18" height="42" rx="6"/><rect x="247" y="350" width="18" height="42" rx="6"/><rect x="298" y="350" width="18" height="42" rx="6"/><rect x="120" y="196" width="42" height="18" rx="6"/><rect x="120" y="247" width="42" height="18" rx="6"/><rect x="120" y="298" width="42" height="18" rx="6"/><rect x="350" y="196" width="42" height="18" rx="6"/><rect x="350" y="247" width="42" height="18" rx="6"/><rect x="350" y="298" width="42" height="18" rx="6"/></g><rect x="156" y="156" width="200" height="200" rx="40" fill="#3b82f6"/><path d="M256 192 L320 256 L256 320 L192 256 Z" fill="none" stroke="#fff" stroke-width="16" stroke-linejoin="round"/><circle cx="256" cy="256" r="22" fill="#fff"/></svg>
    <div class="wm"><b>SILICON</b><i>TECH TYCOON</i></div>
    <div class="badge">
      <svg viewBox="0 0 120 40" width="360" height="120" style="filter:drop-shadow(0 10px 26px rgba(0,0,0,.5))"><rect x="0.5" y="0.5" width="119" height="39" rx="8.5" fill="#000" stroke="#A6A6A6"/><g transform="translate(11 9.2) scale(0.0414)" fill="#fff"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5c0 26.2 4.8 53.3 14.4 81.2 12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></g><text x="35" y="16.4" font-family="var(--font)" font-size="6.4" fill="#fff">Download on the</text><text x="34.4" y="31" font-family="var(--font)" font-weight="600" font-size="16" letter-spacing="-0.3" fill="#fff">App Store</text></svg>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const lerp = (a,b,p) => a + (b-a)*p;
const clamp01 = v => v<0?0:v>1?1:v;
const easeInOut = p => p<0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
const easeOut = p => 1 - Math.pow(1-p,3);

let SCN = null;
window.setScenario = s => { SCN = s; $("glow").style.background = s.accent || "#3b82f6"; $("tint").style.background = s.accent||"#3b82f6"; };

// preload every shot used, resolve when all decoded
window.preload = async (paths) => {
  await Promise.all(paths.map(p => new Promise(res => { const im = new Image(); im.onload=im.onerror=res; im.src=p; })));
  return true;
};

/* compute clip start times (clips overlap by xfade) */
function layout(s){
  const xf = s.xfade ?? 0.5; let start = 0; const clips = [];
  s.clips.forEach((c,i) => { clips.push({ ...c, start }); start += c.dur - (i < s.clips.length-1 ? xf : 0); });
  const bodyEnd = start; // last clip end already folded
  return { clips, xf, bodyEnd, total: bodyEnd + (s.endcard?.dur||0) };
}

/* render one clip into a given layer at local time lt */
function paint(layerEl, imgEl, clip, lt, opacity){
  const p = easeInOut(clamp01(lt / clip.dur));
  const sc = lerp(clip.kb[0], clip.kb[1], p);
  const x  = lerp(clip.kb[2], clip.kb[3], p);
  const y  = lerp(clip.kb[4], clip.kb[5], p);
  imgEl.style.objectPosition = clip.objPos || "50% 20%";
  imgEl.style.transform = `translate(${x}%, ${y}%) scale(${sc})`;
  layerEl.style.opacity = opacity;
}

window.renderFrame = (t) => {
  const s = SCN, L = layout(s);
  // active clips at time t (max 2 during a crossfade)
  const active = [];
  L.clips.forEach((c,i) => { if (t >= c.start - 1e-4 && t < c.start + c.dur) active.push({c,i}); });
  const slots = [ {el:$("L0"),img:$("I0")}, {el:$("L1"),img:$("I1")} ];
  slots.forEach(s2 => s2.el.style.opacity = 0);
  active.slice(0,2).forEach((a,k) => {
    const { c, i } = a; const lt = t - c.start;
    // opacity: fade in over xf at clip start (if not first), fade out over xf at end (if not last)
    let op = 1;
    if (i > 0 && lt < L.xf) op = easeOut(clamp01(lt / L.xf));
    if (i < L.clips.length-1 && (c.dur - lt) < L.xf) op = Math.min(op, easeOut(clamp01((c.dur - lt) / L.xf)));
    const slot = slots[k];
    if (slot.img.src.indexOf(c.src) === -1) slot.img.src = c.src;
    paint(slot.el, slot.img, c, lt, op);
  });
  // breathing glow
  $("glow").style.opacity = 0.20 + 0.12 * (0.5 + 0.5*Math.sin(t*1.6));
  // brand bug: gently fades in after 1.2s, out before the end card
  let bug = clamp01((t - 1.2) / 0.8);
  if (t > L.bodyEnd - 0.6) bug = 0;
  $("bug").style.opacity = 0.85 * bug;
  // end card
  if (s.endcard) {
    const es = L.bodyEnd - 0.35; // start slightly before the last clip fully ends
    const ep = clamp01((t - es) / 0.6);
    $("end").style.opacity = easeOut(ep);
    // a touch of scale-in on the end mark
    const m = $("end").querySelector(".mark");
    m.style.transform = `scale(${lerp(0.9,1,easeOut(ep))})`;
  }
};
window.__totalDuration = () => layout(SCN).total;
</script>
</body>
</html>
