<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0F1115" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F4F5F7" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Silicon" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Design tech products, time the market, and build a global tech empire." />
    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Silicon: Tech Tycoon" />
    <meta property="og:description" content="Design tech products, time the market, and build a global tech empire. Premium, offline, no ads." />
    <meta property="og:image" content="./icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Silicon: Tech Tycoon" />
    <meta name="twitter:description" content="Design tech products, time the market, and build a global tech empire." />
    <meta name="twitter:image" content="./icon-512.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png" />
    <title>Silicon: Tech Tycoon</title>
    <!-- Boot splash — inlined so it paints on first parse (before the JS/CSS bundle loads) and hands
         off seamlessly from the native launch screen: same dark field + chip mark, now with motion
         and a real loading bar that runs while the bundle parses and the game state hydrates.
         main.tsx fills it to 100% and fades it out once React has mounted. -->
    <style>
      #boot {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        background:
          radial-gradient(60% 40% at 50% 42%, #16203a 0%, rgba(15, 17, 21, 0) 70%),
          #0f1115;
        opacity: 1;
        transition: opacity 440ms cubic-bezier(0.4, 0, 0.2, 1);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #boot.boot--done {
        opacity: 0;
        pointer-events: none;
      }
      .boot__logo {
        width: 92px;
        height: 92px;
        filter: drop-shadow(0 0 22px rgba(59, 130, 246, 0.55)) drop-shadow(0 6px 18px rgba(0, 0, 0, 0.5));
        animation: boot-rise 620ms cubic-bezier(0.2, 0.7, 0.2, 1) both, boot-breathe 3.4s ease-in-out 0.7s infinite;
      }
      .boot__logo svg { width: 100%; height: 100%; display: block; }
      .boot__word {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #f4f5f7;
        animation: boot-rise 620ms cubic-bezier(0.2, 0.7, 0.2, 1) 80ms both;
      }
      .boot__bar {
        position: relative;
        width: 168px;
        height: 3px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.09);
        animation: boot-rise 620ms cubic-bezier(0.2, 0.7, 0.2, 1) 160ms both;
      }
      .boot__bar-fill {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: linear-gradient(90deg, #2563eb, #60a5fa);
        box-shadow: 0 0 12px rgba(96, 165, 250, 0.6);
        transform: scaleX(0.04);
        transform-origin: left center;
        animation: boot-load 1150ms cubic-bezier(0.25, 0.6, 0.2, 1) forwards;
        transition: transform 320ms cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes boot-load { from { transform: scaleX(0.04); } to { transform: scaleX(0.9); } }
      @keyframes boot-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes boot-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.035); } }
      @media (prefers-reduced-motion: reduce) {
        .boot__logo, .boot__word, .boot__bar { animation: none; }
        .boot__bar-fill { animation: none; transform: scaleX(0.9); }
        #boot { transition: opacity 120ms linear; }
      }
    </style>
  </head>
  <body>
    <div id="boot" role="status" aria-label="Loading Silicon">
      <div class="boot__logo" aria-hidden="true">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bootChip" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#60a5fa" />
              <stop offset="0.5" stop-color="#3b82f6" />
              <stop offset="1" stop-color="#1e40af" />
            </linearGradient>
          </defs>
          <g fill="#3b82f6">
            <rect x="196" y="120" width="18" height="42" rx="6" />
            <rect x="247" y="120" width="18" height="42" rx="6" />
            <rect x="298" y="120" width="18" height="42" rx="6" />
            <rect x="196" y="350" width="18" height="42" rx="6" />
            <rect x="247" y="350" width="18" height="42" rx="6" />
            <rect x="298" y="350" width="18" height="42" rx="6" />
            <rect x="120" y="196" width="42" height="18" rx="6" />
            <rect x="120" y="247" width="42" height="18" rx="6" />
            <rect x="120" y="298" width="42" height="18" rx="6" />
            <rect x="350" y="196" width="42" height="18" rx="6" />
            <rect x="350" y="247" width="42" height="18" rx="6" />
            <rect x="350" y="298" width="42" height="18" rx="6" />
          </g>
          <rect x="156" y="156" width="200" height="200" rx="40" fill="url(#bootChip)" />
          <rect x="156" y="156" width="200" height="200" rx="40" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" />
          <path d="M256 192 L320 256 L256 320 L192 256 Z" fill="none" stroke="#ffffff" stroke-width="16" stroke-linejoin="round" />
          <circle cx="256" cy="256" r="22" fill="#ffffff" />
        </svg>
      </div>
      <div class="boot__word">Silicon</div>
      <div class="boot__bar"><div class="boot__bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script>window.__bootStart = (window.performance && performance.now) ? performance.now() : Date.now();</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
